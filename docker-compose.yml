# ─────────────────────────────────────────────────────────────
# docker-compose.yml — LOCAL DEVELOPMENT ONLY
# Usage: docker-compose up --build
# Activates Spring profile: local
# ─────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:16-alpine
    container_name: quotestream-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       quotestream
      POSTGRES_USER:     quotestream
      POSTGRES_PASSWORD: quotestream_local
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quotestream"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"   # exposed locally so you can connect with DBeaver/pgAdmin

  app:
    build: .
    container_name: quotestream-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL:                 jdbc:postgresql://db:5432/quotestream
      DB_USER:                quotestream
      DB_PASSWORD:            quotestream_local
    ports:
      - "8080:8080"

volumes:
  pg_data:
