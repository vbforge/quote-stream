<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Quote')}"></head>
<body class="page-dashboard">

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="dash-main">
    <div class="dash-container dash-container--narrow">

        <header class="dash-header">
            <div>
                <a th:href="@{/quotes}" class="back-link">← Quotes</a>
                <h1 class="dash-title">Edit quote</h1>
            </div>
        </header>

        <form th:action="@{/quotes/{id}(id=${quote.id})}" method="post"
              th:object="${quoteRequest}" class="card-form card-form--standalone">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label">Quote text *</label>
                <textarea class="form-input form-input--textarea"
                          name="text" rows="5"
                          th:text="${quote.text}"
                          th:classappend="${#fields.hasErrors('text')} ? 'form-input--error' : ''"></textarea>
                <span th:if="${#fields.hasErrors('text')}" th:errors="*{text}" class="form-error"></span>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Author</label>
                    <input class="form-input" type="text" name="author"
                           th:value="${quote.author}" placeholder="e.g. Seneca"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select class="form-input form-select" name="categoryId">
                        <option value="">— None —</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${quote.category != null and quote.category.id == cat.id}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="form-group form-group--row">
                <label class="checkbox-label">
                    <input type="checkbox" name="publicVisible" th:checked="${quote.publicVisible}"/>
                    <span>Public (visible to all users)</span>
                </label>
            </div>

            <div class="form-group--actions">
                <button type="submit" class="btn btn--primary">Save changes</button>
                <a th:href="@{/quotes}" class="btn btn--ghost">Cancel</a>
            </div>
        </form>

    </div>
</main>

</body>
</html>
