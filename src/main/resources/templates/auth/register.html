<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Create account')}"></head>
<body class="page-auth">

<div class="auth-bg">
    <div class="stream-bg__orb stream-bg__orb--1"></div>
    <div class="stream-bg__orb stream-bg__orb--2"></div>
</div>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="auth-main">
    <div class="auth-card">
        <div class="auth-card__header">
            <span class="auth-card__logo">❝</span>
            <h1 class="auth-card__title">Create your stream</h1>
            <p class="auth-card__sub">Free forever. No credit card.</p>
        </div>

        <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

        <form th:action="@{/register}" method="post" class="auth-form"
              th:object="${registerRequest}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-input" th:field="*{username}"
                       th:classappend="${#fields.hasErrors('username')} ? 'form-input--error' : ''"
                       type="text" id="username" placeholder="your_username"
                       autocomplete="username"/>
                <span th:if="${#fields.hasErrors('username')}"
                      th:errors="*{username}" class="form-error"></span>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'form-input--error' : ''"
                       type="email" id="email" placeholder="you@example.com"
                       autocomplete="email"/>
                <span th:if="${#fields.hasErrors('email')}"
                      th:errors="*{email}" class="form-error"></span>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" th:field="*{password}"
                       th:classappend="${#fields.hasErrors('password')} ? 'form-input--error' : ''"
                       type="password" id="password" placeholder="min 6 characters"
                       autocomplete="new-password"/>
                <span th:if="${#fields.hasErrors('password')}"
                      th:errors="*{password}" class="form-error"></span>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm password</label>
                <input class="form-input" th:field="*{confirmPassword}"
                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'form-input--error' : ''"
                       type="password" id="confirmPassword" placeholder="repeat password"
                       autocomplete="new-password"/>
                <span th:if="${#fields.hasErrors('confirmPassword')}"
                      th:errors="*{confirmPassword}" class="form-error"></span>
            </div>

            <button type="submit" class="btn btn--primary btn--full">Create account</button>
        </form>

        <p class="auth-card__footer">
            Already have one? <a th:href="@{/login}">Sign in →</a>
        </p>
    </div>
</main>

</body>
</html>
