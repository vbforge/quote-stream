<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign in')}"></head>
<body class="page-auth">

<div class="auth-bg">
    <div class="stream-bg__orb stream-bg__orb--1"></div>
    <div class="stream-bg__orb stream-bg__orb--2"></div>
</div>

<nav th:replace="~{fragments/layout :: nav}"></nav>

<main class="auth-main">
    <div class="auth-card">
        <div class="auth-card__header">
            <span class="auth-card__logo">❝</span>
            <h1 class="auth-card__title">Welcome back</h1>
            <p class="auth-card__sub">Sign in to your stream</p>
        </div>

        <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>

        <form th:action="@{/login}" method="post" class="auth-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-input" type="text" id="username" name="username"
                       placeholder="your_username" autocomplete="username" required/>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password"
                       placeholder="••••••••" autocomplete="current-password" required/>
            </div>

            <div class="form-group form-group--row">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember-me"/>
                    <span>Stay signed in for 7 days</span>
                </label>
            </div>

            <button type="submit" class="btn btn--primary btn--full">Sign in</button>
        </form>

        <p class="auth-card__footer">
            No account? <a th:href="@{/register}">Create one free →</a>
        </p>
    </div>
</main>

</body>
</html>
