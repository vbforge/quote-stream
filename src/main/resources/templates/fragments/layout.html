<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' · QuoteStream'">QuoteStream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body>

<!-- ── Navigation fragment ── -->
<nav th:fragment="nav" class="nav">
    <div class="nav__inner">
        <a href="/" class="nav__logo">
            <span class="nav__logo-mark">❝</span>
            QuoteStream
        </a>
        <div class="nav__actions">
            <sec:authorize access="isAuthenticated()">
                <a th:href="@{/}" class="nav__link">Stream</a>
                <a th:href="@{/dashboard}" class="nav__link">Dashboard</a>
                <a th:href="@{/quotes}" class="nav__link">Quotes</a>
                <a th:href="@{/categories}" class="nav__link">Categories</a>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="nav__link nav__link--btn">Sign out</button>
                </form>
            </sec:authorize>
            <sec:authorize access="isAnonymous()">
                <a th:href="@{/login}" class="nav__link">Sign in</a>
                <a th:href="@{/register}" class="nav__cta">Get started</a>
            </sec:authorize>
        </div>
    </div>
</nav>

</body>
</html>
