# Database values injected as environment variables by the host
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA no SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Thymeleaf enable cache for performance
spring.thymeleaf.cache=true

# Logging only warnings and errors in production
logging.level.com.quotestream=WARN
logging.level.org.springframework.security=WARN
logging.level.root=WARN
