# ─────────────────────────────────────────────────────────────
# docker-compose.prod.yml — PRODUCTION ONLY
# Usage: docker-compose -f docker-compose.prod.yml up -d
# Requires .env file with: DOCKERHUB_USERNAME, DB_USER, DB_PASSWORD
# Activates Spring profile: prod
# ─────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       quotestream
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NO port 5432 exposed — DB is internal only in production
    networks:
      - internal

  app:
    image: ${DOCKERHUB_USERNAME}/quote-stream:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL:                 jdbc:postgresql://db:5432/quotestream
      DB_USER:                ${DB_USER}
      DB_PASSWORD:            ${DB_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - internal

volumes:
  pg_data:

networks:
  internal:
    driver: bridge
