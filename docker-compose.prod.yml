# docker-compose.prod.yml
# Production override — use alongside docker-compose.yml:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Or standalone (recommended for deployment):
#   docker-compose -f docker-compose.prod.yml up -d

services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       quotestream
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    # NO ports exposed — DB is internal only in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    image: ${DOCKERHUB_USERNAME}/quote-stream:latest   # pulled from DockerHub
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL:      jdbc:postgresql://db:5432/quotestream
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    networks:
      - internal

volumes:
  pg_data:

networks:
  internal:
    driver: bridge
